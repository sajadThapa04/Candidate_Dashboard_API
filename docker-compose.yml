services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./techkraft.db
      JWT_SECRET_KEY: replace-with-a-long-random-secret
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
